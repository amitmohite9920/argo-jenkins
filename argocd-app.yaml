apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/amitmohite9920/argo-jenkins.git
    targetRevision: main
    path: jenkins

  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
